version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: vulnscan-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: vulnscan-frontend
    ports:
      - "8443:8443"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://backend:5000
    depends_on:
      - backend
